<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeoAuth — Sign In</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <div class="page">
    <div class="card">
      <div class="logo">
        <div class="logo-icon">N</div>
        <div class="logo-text">Neo<span>Auth</span></div>
      </div>

      <h1>Welcome back</h1>
      <p class="sub">Sign in to your account to continue</p>

      <div class="field">
        <label>Email or Username</label>
        <input id="identifier" type="text" placeholder="you@example.com" autocomplete="username"/>
      </div>

      <div class="field">
        <label>Password</label>
        <input id="pwd" type="password" placeholder="••••••••" autocomplete="current-password"/>
        <span class="eye" onclick="togglePwd('pwd')">👁</span>
      </div>

      <div class="row">
        <label><input id="remember" type="checkbox"/> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>

      <button class="btn" onclick="login()">Sign In</button>

      <div class="footer-link">
        Don't have an account? <a href="signup.html" class="link">Create one</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
